<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="page">
  <div class="form-card">
    <h1>Create account</h1>

    <form id="registerForm">
      <div class="form-group">
        <label for="registerUsername">Username</label>
        <input id="registerUsername" type="text" placeholder="5-20 characters" required>
      </div>
      <div class="form-group">
        <label for="registerPassword">Password</label>
        <input id="registerPassword" type="password" placeholder="min 8 characters" required>
      </div>
      <div class="form-group">
        <label for="registerConfirmPassword">Confirm Password</label>
        <input id="registerConfirmPassword" type="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary">Create account</button>
    </form>

    <p id="registerMessage" class="message"></p>

    <div class="form-footer">
      Already have an account? <a href="/auth/login">Sign in</a>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
