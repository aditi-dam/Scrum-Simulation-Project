<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="page">
  <div class="form-card">
    <h1>Welcome back</h1>

    <form id="loginForm">
      <div class="form-group">
        <label for="loginUsername">Username</label>
        <input id="loginUsername" type="text" placeholder="your username" required>
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary">Sign in</button>
    </form>

    <div class="divider">or</div>

    <button onclick="continueAsGuest()" class="btn-secondary">Continue as guest</button>

    <p id="loginMessage" class="message"></p>

    <div class="form-footer">
      No account? <a href="/auth/register">Register here</a>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
